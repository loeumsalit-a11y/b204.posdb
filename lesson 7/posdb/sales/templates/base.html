<!-- sales/templates/base.html -->
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS System{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --card-bg: #ffffff;
            --border: #f1f5f9;
        }

        body.dark-mode {
            --bg: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --white: #1e293b;
            --card-bg: #1e293b;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--white);
            box-shadow: var(--shadow);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color 0.3s;
        }


        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/sales/products/" class="logo">
                🛒 POS System
            </a>
            <nav>
                <a href="/sales/" id="nav-dashboard">Dashboard</a>
                <a href="/sales/checkout/" id="nav-checkout" style="color: var(--primary); font-weight: 700;">Checkout</a>
                <a href="/sales/products/" id="nav-products">ផលិតផល</a>
                <a href="/sales/orders/" id="nav-orders">ការបញ្ជាទិញ</a>
                <a href="/admin/" target="_blank">Admin</a>

                <button id="theme-toggle" class="btn" style="background: var(--bg); color: var(--text-main); padding: 0.4rem 0.8rem; border: 1px solid var(--border);">
                    🌙
                </button>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 POS System Management. រក្សាសិទ្ធិគ្រប់យ៉ាង។</p>
    </footer>

    <script>
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        
        // Load theme
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
